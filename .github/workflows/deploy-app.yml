name: Deploy to VPS

on:
  push:
    branches:
      - main # Runs every time you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXTCLOUD_URL: ${{ secrets.NEXTCLOUD_URL }}
          NEXTCLOUD_USER: ${{ secrets.NEXTCLOUD_USER }}
          NEXTCLOUD_PASSWORD: ${{ secrets.NEXTCLOUD_PASSWORD }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          WORKER_PORT: ${{ secrets.WORKER_PORT }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,REDIS_URL,AI_API_KEY,GOOGLE_AI_API_KEY,GEMINI_API_KEY,NEXTCLOUD_URL,NEXTCLOUD_USER,NEXTCLOUD_PASSWORD,FRONTEND_URL,WORKER_PORT
          script: |
            set -e

            DEPLOY_DIR="${DEPLOY_DIR:-dealflow}"
            REPO_URL="https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "First-time setup: cloning repo into $DEPLOY_DIR"
              rm -rf "$DEPLOY_DIR" 2>/dev/null || true
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git remote set-url origin "$REPO_URL" || true
            git fetch origin
            git checkout main
            git pull origin main

            # Write .env from GitHub secrets (envs passed via ssh-action)
            cat > .env << ENVEOF
            DATABASE_URL=$DATABASE_URL
            REDIS_URL=$REDIS_URL
            AI_API_KEY=$AI_API_KEY
            GOOGLE_AI_API_KEY=$GOOGLE_AI_API_KEY
            GEMINI_API_KEY=$GEMINI_API_KEY
            NEXTCLOUD_URL=$NEXTCLOUD_URL
            NEXTCLOUD_USER=$NEXTCLOUD_USER
            NEXTCLOUD_PASSWORD=$NEXTCLOUD_PASSWORD
            FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
            WORKER_PORT=${WORKER_PORT:-8083}
            ENVEOF

            # Stop and remove old containers/images (worker-only stack)
            docker compose -f docker-compose.worker.yml down || true
            docker image prune -f

            # Build and start worker stack
            docker compose -f docker-compose.worker.yml build --no-cache
            docker compose -f docker-compose.worker.yml up -d --force-recreate

            # Show status
            sleep 3
            docker compose -f docker-compose.worker.yml ps
            docker compose -f docker-compose.worker.yml logs --tail=30
