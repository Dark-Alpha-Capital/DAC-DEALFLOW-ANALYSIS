services:
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
      args:
        # DATABASE_URL: ${DATABASE_URL}
        # DIRECT_URL: ${DIRECT_URL}
        # AUTH_SECRET: ${AUTH_SECRET}
        # REDIS_URL: ${REDIS_URL}
        # RESEND_API_KEY: ${RESEND_API_KEY}
        # AI_API_KEY: ${AI_API_KEY}
        # OPENAI_API_KEY: ${OPENAI_API_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}

    restart: unless-stopped
    ports:
      - 3000:3000
    networks:
      - app_network
    # Load environment variables from frontend's .env file for runtime
    # Note: Build args are read from shell environment or root .env file
    env_file:
      - ./apps/frontend/.env
    environment:
      # Core runtime configuration (always set)
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # All other variables (DATABASE_URL, BETTER_AUTH_SECRET, etc.)
      # are loaded from ./apps/web/.env via env_file above
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    container_name: worker
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    restart: always
    ports:
      - 8080:8080
    networks:
      - app_network
    # Load environment variables from worker's .env file
    env_file:
      - ./apps/worker/.env
    # Option 2: Define environment variables directly (alternative)
    # environment:
    #   - REDIS_URL=${REDIS_URL}
    #   - DATABASE_URL=${DATABASE_URL}
    #   - DIRECT_URL=${DIRECT_URL}
    #   - AI_API_KEY=${AI_API_KEY}
    #   - GCLOUD_PROJECT_ID=${GCLOUD_PROJECT_ID}
    #   - GCLOUD_BUCKET=${GCLOUD_BUCKET}
    #   - GCS_CLIENT_EMAIL=${GCS_CLIENT_EMAIL}
    #   - GCS_PRIVATE_KEY=${GCS_PRIVATE_KEY}

# Define a network, which allows containers to communicate
# with each other, by using their container name as a hostname
networks:
  app_network:
    external: true
