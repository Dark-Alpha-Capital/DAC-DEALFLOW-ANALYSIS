services:
  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: dealflow-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # Server (Bun + Hono) - API server
  server:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: dealflow-server
    container_name: dealflow-api
    ports:
      - "${SERVER_PORT:-8082}:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Worker (Bun + BullMQ)
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: dealflow-worker
    container_name: dealflow-worker
    ports:
      - "${WORKER_PORT:-8083}:8081"
    environment:
      - NODE_ENV=production
      - PORT=8081
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - AI_API_KEY=${AI_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - NEXTCLOUD_URL=${NEXTCLOUD_URL}
      - NEXTCLOUD_USER=${NEXTCLOUD_USER}
      - NEXTCLOUD_PASSWORD=${NEXTCLOUD_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Web (Next.js) - Frontend application
  web:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
      # Build-time args: these are read from the environment (or root .env)
      # where `docker compose` is run. They are *not* populated from
      # `env_file`, which only applies at container runtime.
      args:
        DATABASE_URL: ${DATABASE_URL}
        REDIS_URL: ${REDIS_URL:-redis://redis:6379}
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
        AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
        AI_API_KEY: ${AI_API_KEY}
        GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
        RESEND_API_KEY: ${RESEND_API_KEY}
        NEXTCLOUD_URL: ${NEXTCLOUD_URL}
        NEXTCLOUD_USER: ${NEXTCLOUD_USER}
        NEXTCLOUD_PASSWORD: ${NEXTCLOUD_PASSWORD}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        BITRIX_SECRET_KEY: ${BITRIX_SECRET_KEY}
        BITRIX24_WEBHOOK: ${BITRIX24_WEBHOOK}
    image: dealflow-web
    container_name: dealflow-web
    ports:
      - "3006:3000" # External:Internal port mapping
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AI_API_KEY=${AI_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - NEXTCLOUD_URL=${NEXTCLOUD_URL}
      - NEXTCLOUD_USER=${NEXTCLOUD_USER}
      - NEXTCLOUD_PASSWORD=${NEXTCLOUD_PASSWORD}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - BITRIX_SECRET_KEY=${BITRIX_SECRET_KEY}
      - BITRIX24_WEBHOOK=${BITRIX24_WEBHOOK}
    depends_on:
      redis:
        condition: service_healthy
      server:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped
    # Health check to ensure the application is running
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
    # For VM deployment, services communicate via service names (redis, server, worker, web)

volumes:
  redis_data:
    # Persistent storage for Redis data
# Port Summary for VM Deployment:
# - Web:    3006 (HTTP) - Main frontend application
# - Server: 8082 (HTTP) - API server for file handling
# - Worker: 8083 (HTTP) - Background job processor (health checks)
# - Redis:  6380 (TCP)  - Queue/Job processing (can be internal-only)
#
# For production VM deployment:
# 1. Use a reverse proxy (nginx/traefik) to expose ports 80/443
# 2. Map domains: example.com -> web:3000, api.example.com -> server:8080
# 3. Keep worker and redis internal-only (remove port mappings if not needed externally)
# 4. Set NEXT_PUBLIC_APP_URL to your actual domain
# 5. Configure firewall to only expose necessary ports
