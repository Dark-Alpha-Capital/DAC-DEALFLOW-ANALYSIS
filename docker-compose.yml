services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: dealflow
      POSTGRES_PASSWORD: dealflow
      POSTGRES_DB: dealflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealflow -d dealflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
